name: CD Pipeline
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout source code
      - uses: actions/checkout@v4   # updated to v4

      # Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4 # updated to v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build WAR (skip tests for faster deploy)
      - name: Build WAR
        run: mvn clean package -DskipTests

      # Copy WAR to Remote Tomcat
      - name: Copy WAR to Remote Tomcat
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          port: ${{ secrets.REMOTE_PORT }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/project-one-0.0.1-SNAPSHOT.war"
          target: "/var/lib/tomcat11/webapps/project-one.war"
          strip_components: 1

      # Restart Tomcat service
      - name: Restart Tomcat
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          port: ${{ secrets.REMOTE_PORT }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo systemctl restart tomcat11
