name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout source code
      - uses: actions/checkout@v3

      # Cache Maven dependencies for faster builds
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build project
      - name: Build with Maven
        run: mvn clean package

      # Run tests
      - name: Run Tests
        run: mvn test

      # Upload WAR artifact for inspection/download
      - name: Upload WAR
        uses: actions/upload-artifact@v3
        with:
          name: project-one-war
          path: target/project-one-0.0.1-SNAPSHOT.war
